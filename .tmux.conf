# color configuration
set -g default-terminal "screen-256color"

# Set window configuration as 'vi'
setw -g mode-keys vi

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# split panes using | and -
bind = split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# switch panes using 'hjkl' without prefix
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Tmux Vim-bindings for copying into tmux buffer
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
# Copy from tmux buffer to system buffer (clipboard)
# bind -T copy-mode-vi M-y send -X copy-pipe "xclip -i -sel p -f | xclip -i -sel c" \; display-message "Copied to system clipboard"
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -sel clip -i" \; display-message "Copied to system clipboard"

# reload tmux config
unbind r
bind r source-file ~/.tmux.conf\; display-message "Reloaded"
