# Use c-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Support Mouse
set -g mouse on

# Clipboard support
set -g set-clipboard on
set -g allow-passthrough on

# Copy mode (vi keys with system clipboard integration)
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

bind-key s choose-session

# Layout switching
bind-key -n C-Space next-layout

# Window Navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Window Resizing
bind-key H resize-pane -L 5
bind-key J resize-pane -D 5
bind-key K resize-pane -U 5
bind-key L resize-pane -R 5

# Split Window
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind q kill-pane

# Break pane into new window
bind b break-pane

# Join pane from another window
bind B choose-window 'join-pane -h -t "%%"'

# Reload Configuration
bind-key r source-file ~/.tmux.conf

# bell settings (visual bell for notifications)
set -g visual-activity off
set -g visual-bell on
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action any

# clock mode
setw -g clock-mode-colour yellow

# copy mode
setw -g mode-style 'fg=black bg=red bold'

# panes
set -g pane-border-style 'fg=red'
set -g pane-active-border-style 'fg=yellow'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=red'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=black bg=yellow'
set -g status-right '#[fg=black,bg=yellow] #S '
set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=red'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=red bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow]#F '

setw -g window-status-bell-style 'fg=yellow bg=red bold'

# messages
set -g message-style 'fg=yellow bg=red bold'


## Custom Commands

set -g main-pane-width 60%
bind S-Enter "split-window -h -c '#{pane_current_path}'; select-layout main-vertical"

# Bottom terminal pane (15 lines high)
bind Enter split-window -v -l 15 -c "#{pane_current_path}"

bind M-Enter if-shell -F '#{==:#{session_name},scratch}' \
             'detach-client' \
             "display-popup -w 75% -h 75% -E 'tmux new-session -A -s scratch -c \"$HOME\"'"

# Lazygit popup
bind g display-popup -w 90% -h 90% -d '#{pane_current_path}' -E "lazygit"
bind G display-popup -w 90% -h 90% -d '#{pane_current_path}' -E "gh dash"

# Editor window switcher (Ctrl-e) — switch to or create a persistent nvim window
bind C-e run-shell "tmux-window-switcher '✏️' 'nvim' '#{pane_current_path}'"

# # Dev window switcher (Ctrl-d)
# bind C-d run-shell "tmux-window-switcher '🚀' 'bin/dev'"
#
# # Docker window switcher (Ctrl-o)
# bind C-o run-shell "tmux-window-switcher '🐳' 'lazydocker'"
#
# # AI/Claude window switcher (Ctrl-a)
# bind C-a run-shell "tmux-window-switcher '🤖' 'claude'"

# Help popup (searchable keybindings reference)
bind ? display-popup -w 80% -h 80% -E "less ~/.config/tmux/help.txt"

# Notes popup
bind C-n display-popup -w 85% -h 85% -E "note"

# Editor popup (Ctrl+Shift+e: nvim in a popup)
bind E display-popup -w 90% -h 90% -d '#{pane_current_path}' -E "nvim"

# OS file explorer (Finder on macOS, xdg-open on Linux)
bind C-o run-shell "cd '#{pane_current_path}' && open . 2>/dev/null || xdg-open . 2>/dev/null"

## DWM-style Master-Stack Layout

# Create new pane as master (current master goes to stack)
bind m split-window -h -b -c "#{pane_current_path}" \; select-layout main-vertical

# Promote current pane to master
bind M swap-pane -t 1 \; select-layout main-vertical \; select-pane -t 1

# Cycle which pane is master
bind Tab run-shell 'tmux swap-pane -s 1 -t #{pane_index} && tmux select-layout main-vertical && tmux select-pane -t 1'

# Reset to master-stack layout
bind = select-layout main-vertical

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
vim_pattern='(\S+/)?g?\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?'
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +${vim_pattern}$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l


# truecolor
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ",wezterm:RGB"

# selection in copy-mode: Blue on very dark fg (Crust) for readability
set -g mode-style "fg=#181926,bg=#8AADF4"            # fg=Crust, bg=Blue
set -g copy-mode-match-style "fg=#181926,bg=#EED49F" # fg=Crust, bg=Yellow
