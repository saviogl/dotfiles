- defaults:
    link:
      create: true
      relink: true
    brewfile:
      stdout: false
      stderr: false
      include: ['tap', 'brew', 'cask', 'mas']

- clean: ['~']

- link:
    ~/.bash:
      if: '[ `uname` = Linux ]'
    ~/.bash_profile:
      if: '[ `uname` = Linux ]'
    ~/.bashrc:
      if: '[ `uname` = Linux ]'
    ~/.dotfiles: ''
    ~/.gitconfig:
    ~/.gitignore_global:
    ~/.shell:
    ~/.tmux.conf:
    ~/.vim:
    ~/.vimrc:
    ~/.zsh:
      if: '[ `uname` = Darwin ]'
    ~/.zshrc:
      if: '[ `uname` = Darwin ]'

- shell:
  - git update-submodules
  - >
    git cleanall -f
    zsh/plugins/
  - command: ./init.sh
    stdin: true
    stderr: true
    stdout: true

- asdf:
  - plugin: python
    url: https://github.com/tuvistavie/asdf-python.git
  - plugin: nodejs
    url: https://github.com/asdf-vm/asdf-nodejs.git
  - plugin: ruby
    url: https://github.com/asdf-vm/asdf-ruby.git
  - plugin: go
    url: https://github.com/kennyp/asdf-golang.git

